name: AI CI Pipeline

on:
  push:
    branches: [ "gptapi" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install deps
      run: |
        pip install -r requirements.txt

    - name: Lint check
      run: |
        flake8 .
        black --check .

    - name: Run tests
      run: pytest